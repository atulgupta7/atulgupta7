name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"      # every day at 00:00 UTC
  workflow_dispatch:          # allows manual runs from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write             # needed to push the generated SVGs to the 'output' branch

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake from contribution grid
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=39D353
            dist/github-snake.gif?color_snake=39D353&color_dots=#0d1117,#0e4429,#006d32,#26a641,#39d353

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
